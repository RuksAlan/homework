<!doctype html>
<html class="page" lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/index.css" />
    <title>Leader Classic</title>
  </head>
  <body class="page__body">
    <header class="header">
      <div class="header__container container">
        <div class="header__wrapper">
          <a href="#" class="header__logo">
            <img
              class="header__logo-img"
              src="./icons/logo-img.svg"
              width="52"
              height="65"
              alt="Лого LEADER CLASSIC"
            />
            <p class="header__logo-title logo-title">LEADER CLASSIC</p>
          </a>
          <div class="header__language">
            <img
              class="header__language-img"
              width="23"
              height="23"
              src="./icons/flag-ru.png"
              alt="Российский флаг"
            />
            <select class="select" name="language" id="laguage-select">
              <option class="select-item" value="ru">RU</option>
              <option class="select-item" value="eng">ENG</option>
            </select>
          </div>
          <nav class="header_nav-list">
            <li class="header__list">
              <ul class="header__list-item">
                <a href="#" class="header__item-link">Тарифы</a>
              </ul>
              <ul class="header__list-item">
                <a href="#" class="header__item-link">Бонус</a>
              </ul>
              <ul class="header__list-item">
                <a href="#" class="header__item-link">Реферальная</a>
              </ul>
              <ul class="header__list-item">
                <a href="#" class="header__item-link">Контакты</a>
              </ul>
            </li>
          </nav>
          <div class="header__buttons">
            <button class="button__enter button-stroke">Войти</button>
            <button class="button__open-account button-fill">
              Открыть счет
            </button>
          </div>
        </div>
      </div>
    </header>
  </body>
</html>
